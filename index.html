<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Convert funds</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f2f2f2;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .wrap {
    width: 100%;
    max-width: 520px;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    color: #111;
    margin-bottom: 1.75rem;
  }

  /* --- Field label row --- */
  .field-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .field-label {
    font-size: 14px;
    font-weight: 600;
    color: #111;
  }

  /* --- Input card --- */
  .input-card {
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.25rem;
    transition: border-color 0.15s;
  }
  .input-card:focus-within {
    border-color: #111;
  }
  .input-card input[type="number"] {
    flex: 1;
    border: none;
    outline: none;
    font-size: 22px;
    font-weight: 600;
    color: #111;
    background: transparent;
    min-width: 0;
    -moz-appearance: textfield;
  }
  .input-card input[type="number"]::-webkit-outer-spin-button,
  .input-card input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
  }

  /* --- Currency selector button --- */
  .currency-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    border: none;
    background: #f5f5f5;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    color: #111;
    white-space: nowrap;
    padding: 8px 12px;
    border-radius: 50px;
    transition: background 0.15s;
  }
  .currency-btn:hover { background: #e8e8e8; }
  .flag { font-size: 20px; line-height: 1; }
  .chevron { font-size: 10px; color: #666; margin-left: 2px; }

  /* --- Hint text --- */
  .hint {
    font-size: 12px;
    color: #999;
    margin-bottom: 12px;
  }

  /* --- Info card (rates) --- */
  .info-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 6px 0;
  }
  .info-row + .info-row {
    margin-top: 2px;
  }
  .info-row .row-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .info-row .row-name {
    font-size: 14px;
    color: #444;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .info-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid #999;
    font-size: 10px;
    color: #999;
    cursor: default;
    flex-shrink: 0;
  }
  .info-row .row-sub {
    font-size: 12px;
    color: #aaa;
  }
  .info-row .row-val {
    font-size: 14px;
    font-weight: 600;
    color: #111;
    text-align: right;
  }

  /* --- Fee card --- */
  .fee-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 1.5rem;
  }
  .fee-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
  }
  .fee-row .row-name {
    font-size: 14px;
    color: #444;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .fee-row .row-val {
    font-size: 14px;
    color: #444;
  }
  .fee-divider {
    height: 1px;
    background: #ececec;
    margin: 10px 0;
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 4px 0 0;
  }
  .total-row .row-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .total-row .row-name {
    font-size: 14px;
    font-weight: 600;
    color: #111;
  }
  .total-row .row-sub {
    font-size: 12px;
    color: #aaa;
  }
  .total-row .row-val {
    font-size: 15px;
    font-weight: 700;
    color: #111;
  }

  /* --- Reference --- */
  .ref-label {
    font-size: 14px;
    font-weight: 600;
    color: #111;
    margin-bottom: 8px;
  }
  .ref-input {
    width: 100%;
    border: 1.5px solid #ddd;
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 14px;
    background: #fff;
    color: #111;
    outline: none;
    transition: border-color 0.15s;
  }
  .ref-input:focus { border-color: #111; }

  /* --- Modal --- */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 520px;
    padding: 1.25rem 1rem 1rem;
    max-height: 72vh;
    display: flex;
    flex-direction: column;
  }
  .modal-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #111;
  }
  .search-input {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    background: #f5f5f5;
    color: #111;
    outline: none;
    margin-bottom: 8px;
  }
  .currency-list { overflow-y: auto; flex: 1; }
  .currency-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 10px;
    cursor: pointer;
    border-radius: 10px;
    font-size: 14px;
    color: #111;
  }
  .currency-item:hover { background: #f5f5f5; }
  .currency-item .code { font-weight: 600; min-width: 42px; }
  .currency-item .name { color: #888; font-size: 13px; }
  .currency-item.selected { background: #f0f0f0; }
  .close-btn {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 12px;
    background: transparent;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    color: #111;
  }
  .close-btn:hover { background: #f5f5f5; }
</style>
</head>
<body>

<div class="wrap">
  <h1>Convert funds</h1>

  <div class="field-label-row">
    <span class="field-label">You convert</span>
  </div>
  <div class="input-card">
    <input type="number" id="from-amount" value="3000" min="0" step="any" placeholder="0" />
    <button class="currency-btn" onclick="openModal('from')">
      <span class="flag" id="from-flag">🇺🇸</span>
      <span id="from-code">USD</span>
      <span class="chevron">▼</span>
    </button>
  </div>

  <div class="field-label-row">
    <span class="field-label">You receive</span>
  </div>
  <div class="input-card">
    <input type="number" id="to-amount" value="2500" min="0" step="any" placeholder="0" />
    <button class="currency-btn" onclick="openModal('to')">
      <span class="flag" id="to-flag">🇪🇺</span>
      <span id="to-code">EUR</span>
      <span class="chevron">▼</span>
    </button>
  </div>

  <p class="hint">Rates update every 5 seconds</p>

  <div class="info-card">
    <div class="info-row">
      <div class="row-left">
        <span class="row-name">Mid-market rate <span class="info-icon">i</span></span>
      </div>
      <span class="row-val" id="mid-rate">—</span>
    </div>
    <div class="info-row">
      <div class="row-left">
        <span class="row-name">Your rate <span class="info-icon">i</span></span>
        <span class="row-sub">Net rate including FX fee</span>
      </div>
      <span class="row-val" id="your-rate">—</span>
    </div>
  </div>

  <div class="fee-card">
    <div class="fee-row">
      <span class="row-name">FX fee 0.35% <span class="info-icon">i</span></span>
      <span class="row-val" id="fx-fee-amt">—</span>
    </div>
    <div class="fee-divider"></div>
    <div class="total-row">
      <div class="row-left">
        <span class="row-name">Total fees</span>
        <span class="row-sub">Included in <span id="from-code-ref">USD</span> amount</span>
      </div>
      <span class="row-val" id="total-fees">—</span>
    </div>
  </div>

  <div>
    <p class="ref-label">Reference (optional)</p>
    <input type="text" class="ref-input" placeholder="Add a note..." />
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <p class="modal-title">Select currency</p>
    <input type="text" class="search-input" id="modal-search" placeholder="Search currency..." oninput="filterCurrencies()" />
    <div class="currency-list" id="currency-list"></div>
    <button class="close-btn" onclick="closeModalDirect()">Close</button>
  </div>
</div>

<script>
const CURRENCIES = [
  {code:'USD',name:'US Dollar',flag:'🇺🇸'},
  {code:'EUR',name:'Euro',flag:'🇪🇺'},
  {code:'GBP',name:'British Pound',flag:'🇬🇧'},
  {code:'JPY',name:'Japanese Yen',flag:'🇯🇵'},
  {code:'AUD',name:'Australian Dollar',flag:'🇦🇺'},
  {code:'CAD',name:'Canadian Dollar',flag:'🇨🇦'},
  {code:'CHF',name:'Swiss Franc',flag:'🇨🇭'},
  {code:'CNY',name:'Chinese Yuan',flag:'🇨🇳'},
  {code:'HKD',name:'Hong Kong Dollar',flag:'🇭🇰'},
  {code:'NZD',name:'New Zealand Dollar',flag:'🇳🇿'},
  {code:'SEK',name:'Swedish Krona',flag:'🇸🇪'},
  {code:'NOK',name:'Norwegian Krone',flag:'🇳🇴'},
  {code:'DKK',name:'Danish Krone',flag:'🇩🇰'},
  {code:'SGD',name:'Singapore Dollar',flag:'🇸🇬'},
  {code:'MXN',name:'Mexican Peso',flag:'🇲🇽'},
  {code:'BRL',name:'Brazilian Real',flag:'🇧🇷'},
  {code:'ARS',name:'Argentine Peso',flag:'🇦🇷'},
  {code:'CLP',name:'Chilean Peso',flag:'🇨🇱'},
  {code:'COP',name:'Colombian Peso',flag:'🇨🇴'},
  {code:'PEN',name:'Peruvian Sol',flag:'🇵🇪'},
  {code:'UYU',name:'Uruguayan Peso',flag:'🇺🇾'},
  {code:'INR',name:'Indian Rupee',flag:'🇮🇳'},
  {code:'KRW',name:'South Korean Won',flag:'🇰🇷'},
  {code:'THB',name:'Thai Baht',flag:'🇹🇭'},
  {code:'MYR',name:'Malaysian Ringgit',flag:'🇲🇾'},
  {code:'IDR',name:'Indonesian Rupiah',flag:'🇮🇩'},
  {code:'PHP',name:'Philippine Peso',flag:'🇵🇭'},
  {code:'ZAR',name:'South African Rand',flag:'🇿🇦'},
  {code:'TRY',name:'Turkish Lira',flag:'🇹🇷'},
  {code:'SAR',name:'Saudi Riyal',flag:'🇸🇦'},
  {code:'AED',name:'UAE Dirham',flag:'🇦🇪'},
  {code:'ILS',name:'Israeli Shekel',flag:'🇮🇱'},
  {code:'PLN',name:'Polish Zloty',flag:'🇵🇱'},
  {code:'HUF',name:'Hungarian Forint',flag:'🇭🇺'},
  {code:'CZK',name:'Czech Koruna',flag:'🇨🇿'},
  {code:'RON',name:'Romanian Leu',flag:'🇷🇴'},
  {code:'BGN',name:'Bulgarian Lev',flag:'🇧🇬'},
  {code:'RUB',name:'Russian Ruble',flag:'🇷🇺'},
  {code:'UAH',name:'Ukrainian Hryvnia',flag:'🇺🇦'},
  {code:'EGP',name:'Egyptian Pound',flag:'🇪🇬'},
  {code:'NGN',name:'Nigerian Naira',flag:'🇳🇬'},
  {code:'KES',name:'Kenyan Shilling',flag:'🇰🇪'},
  {code:'GHS',name:'Ghanaian Cedi',flag:'🇬🇭'},
  {code:'MAD',name:'Moroccan Dirham',flag:'🇲🇦'},
  {code:'PKR',name:'Pakistani Rupee',flag:'🇵🇰'},
  {code:'BDT',name:'Bangladeshi Taka',flag:'🇧🇩'},
  {code:'VND',name:'Vietnamese Dong',flag:'🇻🇳'},
  {code:'TWD',name:'Taiwan Dollar',flag:'🇹🇼'},
];

const FX_FEE_PCT = 0.35;

let fromCurrency = 'USD';
let toCurrency = 'EUR';
let rates = {};
let activeModal = null;

async function fetchRates() {
  try {
    const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
    const d = await r.json();
    const usdRates = d.usd;
    rates = {};
    for (const c of CURRENCIES) {
      const key = c.code.toLowerCase();
      if (usdRates[key]) rates[c.code] = usdRates[key];
    }
    rates['USD'] = 1;
  } catch(e) {
    rates = {USD:1,EUR:0.864,GBP:0.764,JPY:149.5,AUD:1.532,CAD:1.356,CHF:0.896,CNY:7.24,HKD:7.82,SGD:1.34,MXN:17.1,BRL:4.97,ARS:870,CLP:968,COP:3900,PEN:3.7,UYU:38.5,INR:83.1,KRW:1325,THB:35.1,MYR:4.72,IDR:15600,PHP:56.2,ZAR:18.6,TRY:30.5,SAR:3.75,AED:3.67,ILS:3.74,PLN:4.03,NZD:1.63,SEK:10.4,NOK:10.5,DKK:6.9};
  }
  updateCalc();
}

function getRate(code) { return rates[code] || 1; }

function fmt(n, decimals = 4) {
  return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function updateCalc() {
  const fromAmt = parseFloat(document.getElementById('from-amount').value) || 0;
  const toAmt   = parseFloat(document.getElementById('to-amount').value)   || 0;
  // No API needed: yourRate = toAmt / fromAmt, midRate = yourRate + 0.35%

  const yourRate = fromAmt > 0 ? toAmt / fromAmt : 0;
  const midRate  = yourRate * (1 + FX_FEE_PCT / 100);

  const feeAmt = fromAmt * (FX_FEE_PCT / 100);

  const rateStr = (r) => r > 0 ? `${fromCurrency} 1 = ${toCurrency} ${fmt(r)}` : '—';
  document.getElementById('mid-rate').textContent  = rateStr(midRate);
  document.getElementById('your-rate').textContent = rateStr(yourRate);
  document.getElementById('fx-fee-amt').textContent =
    fromAmt > 0 ? `${fromCurrency} ${fmt(feeAmt, 2)}` : '—';
  document.getElementById('total-fees').textContent =
    fromAmt > 0 ? `${fromCurrency} ${fmt(feeAmt, 2)}` : '—';
  document.getElementById('from-code-ref').textContent = fromCurrency;
}

document.getElementById('from-amount').addEventListener('input', updateCalc);
document.getElementById('to-amount').addEventListener('input', updateCalc);

function openModal(side) {
  activeModal = side;
  document.getElementById('modal-search').value = '';
  renderList('');
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('modal-search').focus(), 100);
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-bg')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-bg').classList.remove('open');
}

function filterCurrencies() {
  renderList(document.getElementById('modal-search').value);
}

function renderList(q) {
  const list = document.getElementById('currency-list');
  const active = activeModal === 'from' ? fromCurrency : toCurrency;
  const filtered = CURRENCIES.filter(c =>
    c.code.toLowerCase().includes(q.toLowerCase()) ||
    c.name.toLowerCase().includes(q.toLowerCase())
  );
  list.innerHTML = filtered.map(c => `
    <div class="currency-item ${c.code === active ? 'selected' : ''}"
         onclick="selectCurrency('${c.code}','${c.flag}')">
      <span style="font-size:22px">${c.flag}</span>
      <span class="code">${c.code}</span>
      <span class="name">${c.name}</span>
    </div>
  `).join('');
}

function selectCurrency(code, flag) {
  if (activeModal === 'from') {
    fromCurrency = code;
    document.getElementById('from-flag').textContent = flag;
    document.getElementById('from-code').textContent = code;
  } else {
    toCurrency = code;
    document.getElementById('to-flag').textContent = flag;
    document.getElementById('to-code').textContent = code;
  }
  closeModalDirect();
  updateCalc();
}

fetchRates();
setInterval(fetchRates, 5000);
</script>
</body>
</html>
