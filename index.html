
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, system-ui); }
.wrap { max-width: 500px; margin: 0 auto; padding: 1.5rem 1rem; }
h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1.5rem; }
.label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.label { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.max-label { font-size: 13px; color: var(--color-text-secondary); }
.field { display: flex; align-items: center; border: 1.5px solid var(--color-border-primary); border-radius: var(--border-radius-lg); padding: 12px 14px; background: var(--color-background-primary); margin-bottom: 1rem; gap: 10px; }
.field:focus-within { border-color: var(--color-border-info, #378ADD); }
.field input[type=number] { flex: 1; border: none; outline: none; font-size: 20px; font-weight: 500; background: transparent; color: var(--color-text-primary); min-width: 0; }
.field input[type=number]::-webkit-outer-spin-button,
.field input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.currency-btn { display: flex; align-items: center; gap: 7px; border: none; background: transparent; cursor: pointer; font-size: 15px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; padding: 4px 6px; border-radius: 8px; }
.currency-btn:hover { background: var(--color-background-secondary); }
.flag { font-size: 18px; line-height: 1; }
.chevron { font-size: 11px; color: var(--color-text-secondary); }
.hint { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 1rem; }
.info-card { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 14px 16px; margin-bottom: 12px; }
.info-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 14px; }
.info-row .name { color: var(--color-text-secondary); }
.info-row .val { font-weight: 500; color: var(--color-text-primary); }
.divider { height: 0.5px; background: var(--color-border-tertiary); margin: 6px 0; }
.total-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0 0; }
.total-row .name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.total-row .val { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.fee-card { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 14px 16px; margin-bottom: 1.5rem; }
.ref-label { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
.ref-input { width: 100%; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; font-size: 14px; background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
.ref-input:focus { border-color: var(--color-border-info, #378ADD); }
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--color-background-primary); border-radius: 16px 16px 0 0; width: 100%; max-width: 500px; padding: 1rem; max-height: 70vh; display: flex; flex-direction: column; }
.modal-title { font-size: 15px; font-weight: 500; margin-bottom: 10px; color: var(--color-text-primary); }
.search-input { width: 100%; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 9px 12px; font-size: 14px; background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; margin-bottom: 8px; }
.currency-list { overflow-y: auto; flex: 1; }
.currency-item { display: flex; align-items: center; gap: 10px; padding: 10px 8px; cursor: pointer; border-radius: 8px; font-size: 14px; color: var(--color-text-primary); }
.currency-item:hover { background: var(--color-background-secondary); }
.currency-item .code { font-weight: 500; min-width: 40px; }
.currency-item .name { color: var(--color-text-secondary); font-size: 13px; }
.currency-item.selected { background: var(--color-background-info, #E6F1FB); }
.close-btn { width: 100%; margin-top: 10px; padding: 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; font-size: 14px; cursor: pointer; color: var(--color-text-primary); }
</style>

<div class="wrap">
  <h1>Convert funds</h1>

  <div class="label-row">
    <span class="label">You convert</span>
    <span class="max-label" id="max-label">Max USD 0.00 ↘</span>
  </div>
  <div class="field">
    <input type="number" id="from-amount" value="3000" min="0" step="any" />
    <button class="currency-btn" onclick="openModal('from')">
      <span class="flag" id="from-flag">🇺🇸</span>
      <span id="from-code">USD</span>
      <span class="chevron">▼</span>
    </button>
  </div>

  <div class="label-row">
    <span class="label">You receive</span>
  </div>
  <div class="field">
    <input type="number" id="to-amount" value="" min="0" step="any" placeholder="0.00" />
    <button class="currency-btn" onclick="openModal('to')">
      <span class="flag" id="to-flag">🇪🇺</span>
      <span id="to-code">EUR</span>
      <span class="chevron">▼</span>
    </button>
  </div>

  <p class="hint">Rates update every 5 seconds</p>

  <div class="info-card">
    <div class="info-row"><span class="name">Mid-market rate ⓘ</span><span class="val" id="mid-rate">—</span></div>
    <div class="info-row"><span class="name">Your rate ⓘ <span style="font-size:11px;font-weight:400;color:var(--color-text-tertiary)">Net rate incl. FX fee</span></span><span class="val" id="your-rate">—</span></div>
  </div>

  <div class="fee-card">
    <div class="info-row">
      <span class="name">FX fee <span id="fx-pct">0.35</span>%
        <span style="font-size:11px;margin-left:4px;">
          <input type="number" id="fx-fee-input" value="0.35" min="0" max="5" step="0.01"
            style="width:52px;font-size:12px;padding:2px 4px;border:1px solid var(--color-border-tertiary);border-radius:4px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;"
            title="Editar FX fee %" />
          %
        </span>
      </span>
      <span class="val" id="fx-fee-usd">—</span>
    </div>
    <div class="divider"></div>
    <div class="total-row">
      <span class="name">Total fees <span style="font-size:11px;font-weight:400;color:var(--color-text-tertiary)">Included in amount</span></span>
      <span class="val" id="total-fees">—</span>
    </div>
  </div>

  <div>
    <p class="ref-label">Reference (optional)</p>
    <input type="text" class="ref-input" placeholder="Add a note..." />
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <p class="modal-title">Select currency</p>
    <input type="text" class="search-input" id="modal-search" placeholder="Search..." oninput="filterCurrencies()" />
    <div class="currency-list" id="currency-list"></div>
    <button class="close-btn" onclick="closeModalDirect()">Close</button>
  </div>
</div>

<script>
const CURRENCIES = [
  {code:'USD',name:'US Dollar',flag:'🇺🇸'},
  {code:'EUR',name:'Euro',flag:'🇪🇺'},
  {code:'GBP',name:'British Pound',flag:'🇬🇧'},
  {code:'JPY',name:'Japanese Yen',flag:'🇯🇵'},
  {code:'AUD',name:'Australian Dollar',flag:'🇦🇺'},
  {code:'CAD',name:'Canadian Dollar',flag:'🇨🇦'},
  {code:'CHF',name:'Swiss Franc',flag:'🇨🇭'},
  {code:'CNY',name:'Chinese Yuan',flag:'🇨🇳'},
  {code:'HKD',name:'Hong Kong Dollar',flag:'🇭🇰'},
  {code:'NZD',name:'New Zealand Dollar',flag:'🇳🇿'},
  {code:'SEK',name:'Swedish Krona',flag:'🇸🇪'},
  {code:'NOK',name:'Norwegian Krone',flag:'🇳🇴'},
  {code:'DKK',name:'Danish Krone',flag:'🇩🇰'},
  {code:'SGD',name:'Singapore Dollar',flag:'🇸🇬'},
  {code:'MXN',name:'Mexican Peso',flag:'🇲🇽'},
  {code:'BRL',name:'Brazilian Real',flag:'🇧🇷'},
  {code:'ARS',name:'Argentine Peso',flag:'🇦🇷'},
  {code:'CLP',name:'Chilean Peso',flag:'🇨🇱'},
  {code:'COP',name:'Colombian Peso',flag:'🇨🇴'},
  {code:'PEN',name:'Peruvian Sol',flag:'🇵🇪'},
  {code:'UYU',name:'Uruguayan Peso',flag:'🇺🇾'},
  {code:'INR',name:'Indian Rupee',flag:'🇮🇳'},
  {code:'KRW',name:'South Korean Won',flag:'🇰🇷'},
  {code:'THB',name:'Thai Baht',flag:'🇹🇭'},
  {code:'MYR',name:'Malaysian Ringgit',flag:'🇲🇾'},
  {code:'IDR',name:'Indonesian Rupiah',flag:'🇮🇩'},
  {code:'PHP',name:'Philippine Peso',flag:'🇵🇭'},
  {code:'ZAR',name:'South African Rand',flag:'🇿🇦'},
  {code:'TRY',name:'Turkish Lira',flag:'🇹🇷'},
  {code:'SAR',name:'Saudi Riyal',flag:'🇸🇦'},
  {code:'AED',name:'UAE Dirham',flag:'🇦🇪'},
  {code:'ILS',name:'Israeli Shekel',flag:'🇮🇱'},
  {code:'PLN',name:'Polish Zloty',flag:'🇵🇱'},
  {code:'HUF',name:'Hungarian Forint',flag:'🇭🇺'},
  {code:'CZK',name:'Czech Koruna',flag:'🇨🇿'},
  {code:'RON',name:'Romanian Leu',flag:'🇷🇴'},
  {code:'BGN',name:'Bulgarian Lev',flag:'🇧🇬'},
  {code:'HRK',name:'Croatian Kuna',flag:'🇭🇷'},
  {code:'RUB',name:'Russian Ruble',flag:'🇷🇺'},
  {code:'UAH',name:'Ukrainian Hryvnia',flag:'🇺🇦'},
  {code:'EGP',name:'Egyptian Pound',flag:'🇪🇬'},
  {code:'NGN',name:'Nigerian Naira',flag:'🇳🇬'},
  {code:'KES',name:'Kenyan Shilling',flag:'🇰🇪'},
  {code:'GHS',name:'Ghanaian Cedi',flag:'🇬🇭'},
  {code:'MAD',name:'Moroccan Dirham',flag:'🇲🇦'},
  {code:'PKR',name:'Pakistani Rupee',flag:'🇵🇰'},
  {code:'BDT',name:'Bangladeshi Taka',flag:'🇧🇩'},
  {code:'VND',name:'Vietnamese Dong',flag:'🇻🇳'},
  {code:'TWD',name:'Taiwan Dollar',flag:'🇹🇼'},
];

let fromCurrency = 'USD';
let toCurrency = 'EUR';
let rates = {};
let activeModal = null;
let lastEdited = 'from';

async function fetchRates() {
  try {
    const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
    const d = await r.json();
    const usdRates = d.usd;
    rates = {};
    for (const c of CURRENCIES) {
      const key = c.code.toLowerCase();
      if (usdRates[key]) rates[c.code] = usdRates[key];
    }
    rates['USD'] = 1;
    updateCalc();
  } catch(e) {
    rates = {USD:1,EUR:0.864,GBP:0.764,JPY:149.5,AUD:1.532,CAD:1.356,CHF:0.896,CNY:7.24,HKD:7.82,SGD:1.34,MXN:17.1,BRL:4.97,ARS:870,CLP:968,COP:3900,PEN:3.7,UYU:38.5,INR:83.1,KRW:1325,THB:35.1,MYR:4.72,IDR:15600,PHP:56.2,ZAR:18.6,TRY:30.5,SAR:3.75,AED:3.67,ILS:3.74,PLN:4.03,NZD:1.63,SEK:10.4,NOK:10.5,DKK:6.9};
    updateCalc();
  }
}

function getRate(code) { return rates[code] || 1; }

function getFxPct() {
  return parseFloat(document.getElementById('fx-fee-input').value) || 0;
}

function updateCalc() {
  if (!rates.USD) return;
  const fxPct = getFxPct();
  const midFrom = getRate(fromCurrency);
  const midTo = getRate(toCurrency);
  const midRate = midTo / midFrom;
  const yourRate = midRate * (1 - fxPct / 100);

  const fromAmt = parseFloat(document.getElementById('from-amount').value) || 0;
  const toAmt = parseFloat(document.getElementById('to-amount').value) || 0;

  if (lastEdited === 'from') {
    const received = fromAmt * yourRate;
    document.getElementById('to-amount').value = received > 0 ? received.toFixed(2) : '';
  } else {
    const needed = toAmt / yourRate;
    document.getElementById('from-amount').value = needed > 0 ? needed.toFixed(2) : '';
  }

  const currentFrom = parseFloat(document.getElementById('from-amount').value) || 0;
  const feeAmt = currentFrom * (fxPct / 100);
  const fromCode = fromCurrency;
  const toCode = toCurrency;

  document.getElementById('mid-rate').textContent = `${fromCode} 1 = ${toCode} ${midRate.toFixed(4)}`;
  document.getElementById('your-rate').textContent = `${fromCode} 1 = ${toCode} ${yourRate.toFixed(4)}`;
  document.getElementById('fx-pct').textContent = fxPct.toFixed(2);
  document.getElementById('fx-fee-usd').textContent = `${fromCode} ${feeAmt.toFixed(2)}`;
  document.getElementById('total-fees').textContent = `${fromCode} ${feeAmt.toFixed(2)}`;
  document.getElementById('max-label').textContent = `Max ${fromCode} —`;
}

document.getElementById('from-amount').addEventListener('input', () => { lastEdited = 'from'; updateCalc(); });
document.getElementById('to-amount').addEventListener('input', () => { lastEdited = 'to'; updateCalc(); });
document.getElementById('fx-fee-input').addEventListener('input', updateCalc);

function openModal(side) {
  activeModal = side;
  document.getElementById('modal-search').value = '';
  renderList('');
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('modal-search').focus(), 100);
}
function closeModal(e) { if (e.target === document.getElementById('modal-bg')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-bg').classList.remove('open'); }

function filterCurrencies() {
  renderList(document.getElementById('modal-search').value);
}

function renderList(q) {
  const list = document.getElementById('currency-list');
  const active = activeModal === 'from' ? fromCurrency : toCurrency;
  const filtered = CURRENCIES.filter(c =>
    c.code.toLowerCase().includes(q.toLowerCase()) ||
    c.name.toLowerCase().includes(q.toLowerCase())
  );
  list.innerHTML = filtered.map(c => `
    <div class="currency-item ${c.code === active ? 'selected' : ''}" onclick="selectCurrency('${c.code}','${c.flag}','${c.name}')">
      <span style="font-size:20px">${c.flag}</span>
      <span class="code">${c.code}</span>
      <span class="name">${c.name}</span>
    </div>
  `).join('');
}

function selectCurrency(code, flag, name) {
  if (activeModal === 'from') {
    fromCurrency = code;
    document.getElementById('from-flag').textContent = flag;
    document.getElementById('from-code').textContent = code;
  } else {
    toCurrency = code;
    document.getElementById('to-flag').textContent = flag;
    document.getElementById('to-code').textContent = code;
  }
  closeModalDirect();
  updateCalc();
}

fetchRates();
setInterval(fetchRates, 5000);
</script>
